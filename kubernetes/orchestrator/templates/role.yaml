apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps", "pods", "pods/log", "pods/status", "pods/exec", "configmaps", "persistentvolumeclaims"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["*"]