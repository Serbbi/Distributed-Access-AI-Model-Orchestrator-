replicaCount: 3

image:
  repository: registry.gitlab.com/rug-cs/courses/scalable-computing/2024-2025/students/group-1/group-1-project/orchestrator
  pullPolicy: Always
  tag: latest


imagePullSecrets: 
  - name: gitlab-registry-secret
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: 
- name: docker-socket
  hostPath:
    path: /var/run/docker.sock

# Additional volumeMounts on the output Deployment definition.
volumeMounts: 
  - name: docker-socket
    mountPath: /var/run/docker.sock

nodeSelector: {}

tolerations: []

affinity: {}

namespace: default

env:
  envVars:
    - CODE_BLOCKS_EXCHANGE
    - CODE_QUEUE_NAME
    - LOGS_EXCHANGE
    - LOGS_ROUTING_KEY
    - SPRING_RABBITMQ_HOST
    - RABBIT_MQ_PORT
    - RABBIT_MQ_UI_PORT
    - SPRING_RABBITMQ_USERNAME
    - SPRING_RABBITMQ_PASSWORD
    - RABBIT_MQ_VIRTUAL_HOST
  envName: orch-secret
