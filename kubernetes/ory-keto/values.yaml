image:
  repository: registry.gitlab.com/rug-cs/courses/scalable-computing/2024-2025/students/group-1/group-1-project/keto
  tag: 'latest'
  pullPolicy: Always

service:
  type: ClusterIP
  port: 4466

imagePullSecrets:
  - name: gitlab-registry-secret
nameOverride: "keto"
fullnameOverride: "keto"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /health/ready
    port: 4466
readinessProbe:
  httpGet:
    path: /health/ready
    port: 4466

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: false
  className: "traefik"
  annotations: {}
  hosts: []
  tls: []
